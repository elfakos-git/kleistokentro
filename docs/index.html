<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KleistoKentro — τι κλείνει στο κέντρο της Αθήνας</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* ——— Palette: Greek road-signage daylight ———
     sign blue #0F4C9A · asphalt ink #23272B · paper #EDEFF1
     clear green #1E7A46 · works amber #DB9A0F · closed red #C0392B */
  :root{
    --blue:#0F4C9A; --blue-deep:#0B3B78; --ink:#23272B; --paper:#EDEFF1;
    --card:#FFFFFF; --line:#D6DADF; --mut:#6A7178;
    --ok:#1E7A46; --warn:#DB9A0F; --alert:#C0392B;
    --disp:"Barlow Semi Condensed",sans-serif; --body:"Barlow",system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0}
  body{background:var(--paper);color:var(--ink);font-family:var(--body);
       font-size:16px;line-height:1.45;padding:16px;max-width:1240px;margin:0 auto}

  /* Signature: header set as a Greek blue direction sign */
  .sign{background:linear-gradient(135deg,var(--blue),var(--blue-deep));color:#fff;border-radius:14px;
        border:3px solid #fff;outline:2px solid var(--blue-deep);
        padding:14px 18px;display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
  .sign h1{font-family:var(--disp);font-weight:700;font-size:1.6rem;letter-spacing:.02em}
  .sign h1 .kk{opacity:.78;font-weight:600}
  .sign .km{font-family:var(--disp);font-weight:600;opacity:.85;font-size:.95rem}

  .answer{margin:18px 0 4px;font-family:var(--disp);font-weight:700;
          font-size:2rem;line-height:1.1;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .lamp{width:18px;height:18px;border-radius:50%;flex:none;
        box-shadow:inset 0 -2px 3px rgba(0,0,0,.25)}
  .sub{color:var(--mut);font-size:.9rem;margin-bottom:14px}

  h2{font-family:var(--disp);font-weight:600;font-size:.85rem;text-transform:uppercase;
     letter-spacing:.09em;color:var(--mut);margin:24px 0 10px;
     display:flex;align-items:center;gap:8px}
  h2::before{content:"";width:16px;height:3px;background:var(--blue);
             border-radius:2px;flex:none}
  .hint{color:var(--mut);font-size:.82rem;margin:-4px 0 10px}
  h2:first-child{margin-top:0}
  h2 .count{color:var(--ink);background:var(--line);border-radius:5px;
            padding:1px 7px;margin-left:6px;font-size:.75rem}

  /* ——— Filters ——— */
  .filters{display:flex;flex-wrap:wrap;gap:6px;margin:0 0 6px;align-items:center}
  .filters .lbl{font-family:var(--disp);font-size:.72rem;font-weight:600;
                text-transform:uppercase;letter-spacing:.07em;color:var(--mut);margin-right:2px}
  .chip{font-family:var(--disp);font-weight:600;font-size:.82rem;letter-spacing:.02em;
        background:var(--card);border:1px solid var(--line);color:var(--ink);
        border-radius:999px;padding:4px 12px;cursor:pointer}
  .chip[aria-pressed="true"]{background:var(--blue);border-color:var(--blue-deep);color:#fff}
  .chip:hover{border-color:var(--blue)}
  .chip:focus-visible{outline:2px solid var(--blue-deep);outline-offset:2px}

  /* ——— Dashboard grid: main column + system column ——— */
  .layout{display:grid;gap:0 24px;grid-template-columns:1fr}
  @media (min-width:960px){
    .layout{grid-template-columns:minmax(0,1fr) 330px;align-items:start}
    .side{grid-column:2;grid-row:1;position:sticky;top:16px}
    .main{grid-column:1;grid-row:1}
  }

  /* ——— Event cards (main list) ——— */
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;
        padding:13px 15px;margin-bottom:10px;
        box-shadow:0 1px 2px rgba(15,40,80,.05);transition:box-shadow .15s,transform .15s}
  .card:hover{box-shadow:0 4px 12px rgba(15,40,80,.09);transform:translateY(-1px)}
  .card.new{border-left:5px solid var(--alert)}
  .card .src{font-family:var(--disp);font-weight:600;font-size:.78rem;color:var(--blue);
             text-transform:uppercase;letter-spacing:.06em}
  .card .t{font-weight:600;margin:2px 0}
  .card .d{color:var(--mut);font-size:.92rem;white-space:pre-line}
  .card a{color:var(--blue);text-decoration:none;font-size:.9rem}
  a:focus-visible{outline:2px solid var(--blue-deep);outline-offset:2px}
  .badge{float:right;background:var(--alert);color:#fff;border-radius:5px;
         font-family:var(--disp);font-size:.72rem;font-weight:700;padding:2px 7px;
         text-transform:uppercase;letter-spacing:.05em}
  .tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
  .tag{font-family:var(--disp);font-weight:600;font-size:.72rem;letter-spacing:.04em;
       border-radius:5px;padding:2px 7px;background:var(--paper);
       border:1px solid var(--line);color:var(--mut)}
  .tag.area{color:var(--blue);border-color:var(--blue)}
  .tag.today{background:var(--alert);border-color:var(--alert);color:#fff}
  .tag.now{background:var(--alert);border-color:var(--alert);color:#fff;font-weight:700}
  .tag.ext{background:var(--warn);border-color:var(--warn);color:#fff}

  /* ——— Realtime strip (TomTom) — temporary-works signage: compact, amber-edged ——— */
  .rt{background:var(--card);border:1px solid var(--line);border-left:5px solid var(--warn);
      border-radius:8px;padding:8px 12px;margin-bottom:6px;font-size:.92rem;
      display:flex;gap:10px;align-items:baseline;flex-wrap:wrap}
  .rt .t{font-weight:600;min-width:0}
  .rt .tag{flex:none}
  .rt a{color:var(--blue);text-decoration:none;font-size:.85rem;white-space:nowrap;margin-left:auto}
  .rt .d{color:var(--mut);font-size:.85rem;flex-basis:100%}

  /* ——— Past / expired events: collapsed, dimmed ——— */
  .ghost{background:none;border:1px dashed var(--line);border-radius:8px;color:var(--mut);
         font-family:var(--disp);font-weight:600;font-size:.82rem;letter-spacing:.05em;
         text-transform:uppercase;padding:8px 14px;cursor:pointer;margin-top:24px}
  .ghost:hover{border-color:var(--blue);color:var(--blue)}
  #past{margin-top:12px}
  #past .card{opacity:.65;box-shadow:none}
  #past .card:hover{opacity:1;transform:none}
  .pastwrap{margin-top:22px}
  .pastwrap summary{cursor:pointer;list-style:none;display:flex;align-items:center;gap:6px;
                    font-family:var(--disp);font-weight:600;font-size:.85rem;
                    text-transform:uppercase;letter-spacing:.09em;color:var(--mut);
                    margin:0 0 10px}
  .pastwrap summary::-webkit-details-marker{display:none}
  .pastwrap summary::after{content:"▾";transition:transform .15s}
  .pastwrap:not([open]) summary::after{transform:rotate(-90deg)}
  .pastwrap .card{opacity:.7}

  /* ——— Calendar: month grid + day list, side by side when wide ——— */
  .calwrap{display:grid;gap:12px;grid-template-columns:1fr;align-items:start}
  @media (min-width:700px){.calwrap{grid-template-columns:300px minmax(0,1fr)}}
  .calbox{background:var(--card);border:1px solid var(--line);border-radius:10px;
          padding:10px 12px}
  .calnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .calnav button{border:1px solid var(--line);background:var(--paper);border-radius:6px;
                 width:28px;height:28px;cursor:pointer;font-size:1rem;line-height:1;color:var(--ink)}
  .calnav .mt{font-family:var(--disp);font-weight:700;text-transform:uppercase;
              letter-spacing:.04em;font-size:.9rem}
  .calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
  .calgrid .wd{font-family:var(--disp);font-size:.65rem;font-weight:600;color:var(--mut);
               text-align:center;text-transform:uppercase;padding:2px 0}
  .cd{position:relative;aspect-ratio:1;border:1px solid transparent;border-radius:7px;
      display:flex;align-items:center;justify-content:center;font-size:.82rem;
      color:var(--ink);background:none;font-family:var(--body);padding:0}
  .cd.off{visibility:hidden}
  .cd.pastd{color:var(--mut)}
  .cd.today{border-color:var(--blue);font-weight:700;background:#E4EDF9}
  .cd.has{background:var(--paper);border-color:var(--line);cursor:pointer;font-weight:600}
  .cd.has::after{content:attr(data-n);position:absolute;top:-4px;right:-4px;
                 background:var(--alert);color:#fff;border-radius:999px;font-size:.6rem;
                 font-family:var(--disp);font-weight:700;min-width:15px;height:15px;
                 line-height:15px;text-align:center;padding:0 2px}
  .cd.sel{background:var(--blue);color:#fff;border-color:var(--blue-deep)}
  .calclear{margin-bottom:8px}

  .day{background:var(--card);border:1px solid var(--line);border-radius:10px;
       padding:10px 14px;margin-bottom:8px}
  .day .dh{font-family:var(--disp);font-weight:700;font-size:.95rem;
           text-transform:uppercase;letter-spacing:.04em;display:flex;gap:8px;align-items:baseline}
  .day .dh .dcount{color:var(--mut);font-weight:600;font-size:.8rem}
  .day .ci{padding:5px 0 0;font-size:.9rem;display:flex;gap:8px;align-items:baseline}
  .day .ci a{color:var(--ink);text-decoration:none;min-width:0}
  .day .ci a:hover{color:var(--blue)}
  .day .ci.long{color:var(--mut)}
  .day .ci.long a{color:var(--mut)}
  .later{color:var(--mut);font-size:.85rem;padding:2px 4px 8px}

  /* ——— System panel ——— */
  .panel{background:var(--card);border:1px solid var(--line);border-radius:10px;
         padding:4px 14px 10px;margin-bottom:12px}
  .panel details{border-top:1px solid var(--line)}
  .panel details:first-child{border-top:none}
  .panel summary{cursor:pointer;list-style:none;display:flex;align-items:center;gap:8px;
                 padding:10px 0;font-family:var(--disp);font-weight:600;font-size:.85rem;
                 text-transform:uppercase;letter-spacing:.08em;color:var(--mut)}
  .panel summary::-webkit-details-marker{display:none}
  .panel summary::after{content:"▾";margin-left:auto;transition:transform .15s}
  .panel details:not([open]) summary::after{transform:rotate(-90deg)}
  .srcrow{display:flex;flex-wrap:wrap;align-items:baseline;gap:2px 8px;padding:6px 0;
          font-size:.9rem;border-top:1px dashed var(--line)}
  .srcrow:first-of-type{border-top:none}
  .srcrow .lamp{width:11px;height:11px;align-self:center;flex:none}
  .srcrow .n{font-weight:600;flex:1;min-width:0}
  .srcrow .meta{color:var(--mut);font-size:.82rem;white-space:nowrap;
                font-variant-numeric:tabular-nums}
  /* Drop reasons: revealed on hover / focus / tap — kept out of the way otherwise */
  .drops{display:none;flex-basis:100%;color:var(--mut);font-size:.78rem;padding-left:19px}
  .srcrow:hover .drops,.srcrow:focus-within .drops,.srcrow:focus .drops,
  .srcrow.open .drops{display:block}
  .noterow{padding:7px 0;border-top:1px dashed var(--line);font-size:.88rem}
  .noterow:first-of-type{border-top:none}
  .noterow .when{font-family:var(--disp);font-size:.75rem;font-weight:600;
                 text-transform:uppercase;letter-spacing:.05em;color:var(--blue)}
  .noterow a{color:var(--ink);text-decoration:none}
  .noterow a:hover{color:var(--blue)}

  .empty{background:var(--card);border:1px dashed var(--line);border-radius:10px;
         padding:18px;color:var(--mut);text-align:center}
  footer{margin:28px 0 8px;color:var(--mut);font-size:.8rem;text-align:center}
  footer a{color:var(--mut)}
  @media (prefers-reduced-motion:no-preference){
    .card,.rt,.answer{animation:in .25s ease-out both}
    @keyframes in{from{opacity:0;transform:translateY(4px)}to{opacity:1}}
  }
</style>
</head>
<body>
<header class="sign">
  <h1>Kleisto<span class="kk">Kentro</span></h1>
  <span class="km">κέντρο Αθήνας · live</span>
</header>

<div class="answer" id="answer"><span class="lamp" style="background:var(--mut)"></span>Μια στιγμή…</div>
<div class="sub" id="checked"></div>

<div class="filters" id="srcFilters" role="group" aria-label="Φίλτρο πηγής"></div>
<div class="filters" id="areaFilters" role="group" aria-label="Φίλτρο περιοχής"></div>

<div class="layout">

  <!-- System column: in the DOM before the events so that on narrow
       screens it appears ABOVE the event list; on wide screens the grid
       places it as a sticky right-hand panel. -->
  <aside class="side">
    <h2>Σύστημα</h2>
    <div class="panel">
      <details open>
        <summary>Πηγές δεδομένων</summary>
        <div id="health"></div>
      </details>
      <details>
        <summary>Ειδοποιήσεις</summary>
        <div id="history"></div>
      </details>
    </div>
  </aside>

  <main class="main">
    <h2>Τι έρχεται</h2>
    <div class="calwrap">
      <div class="calbox">
        <div class="calnav">
          <button onclick="calMove(-1)" aria-label="Προηγούμενος μήνας">‹</button>
          <span class="mt" id="calTitle"></span>
          <button onclick="calMove(1)" aria-label="Επόμενος μήνας">›</button>
        </div>
        <div class="calgrid" id="calGrid"></div>
      </div>
      <div id="calList"></div>
    </div>

    <h2>Σε ισχύ<span class="count" id="cMain"></span></h2>
    <div id="events"></div>

    <h2>Ζωντανά περιστατικά<span class="count" id="cRt"></span></h2>
    <div class="hint">Μεμονωμένα σημεία από δεδομένα κυκλοφορίας — δεν στέλνουν ειδοποιήσεις.</div>
    <div id="rtlist"></div>

    <button class="ghost" id="pastToggle" onclick="togglePast()" hidden></button>
    <div id="past" hidden></div>
  </main>
</div>

<footer id="foot"></footer>

<script>
const $ = id => document.getElementById(id);
const esc = s => (s||"").replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const isRT = e => (e.source||"").startsWith("TomTom");

const SHORT_SRC = {          // compact chip labels
  "Τροχαία (astynomia.gr)": "Τροχαία",
  "Διαύγεια (Τροχαία)": "Διαύγεια",
  "iefimerida": "iefimerida",
  "kathimerini": "Καθημερινή",
  "ΟΑΣΑ": "ΟΑΣΑ",
  "TomTom (realtime)": "TomTom",
};
const DAYS_EL = ["Κυρ","Δευ","Τρί","Τετ","Πέμ","Παρ","Σάβ"];
const WD_HEAD = ["Δε","Τρ","Τε","Πε","Πα","Σά","Κυ"];   // Monday-first grid
const MONTHS_EL = ["Ιαν","Φεβ","Μαρ","Απρ","Μαΐ","Ιουν","Ιουλ","Αυγ","Σεπ","Οκτ","Νοε","Δεκ"];
const MONTHS_FULL = ["Ιανουάριος","Φεβρουάριος","Μάρτιος","Απρίλιος","Μάιος","Ιούνιος",
                     "Ιούλιος","Αύγουστος","Σεπτέμβριος","Οκτώβριος","Νοέμβριος","Δεκέμβριος"];
const LONG_EVENT_DAYS = 4;   // events spanning >= this many days render muted in the calendar
const LIST_HORIZON_DAYS = 62;
const PAST_GRACE_DAYS = 4;   // mirrors sources/enrich.py

let DATA = null;
let filt = {src: null, area: null};
let cal = {y: null, m: null, sel: null};   // m is 0-based; sel is an ISO day
let showPast = false;                       // dated-past events: opt-in only
window.togglePast = () => { showPast = !showPast; render(); };
let REG = new Map();                        // closure registry lookup

function ago(iso){
  if(!iso) return "ποτέ";
  const m = Math.round((Date.now()-new Date(iso))/60000);
  if(m<1) return "μόλις τώρα";
  if(m<60) return m+"′ πριν";
  const h = Math.round(m/60);
  if(h<48) return h+" ώρ. πριν";
  return Math.round(h/24)+" ημ. πριν";
}
function isoOf(d){
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}
function todayISO(){ return isoOf(new Date()); }
function fmtDay(iso, withWd){
  const [y,m,d] = iso.split("-").map(Number);
  const wd = DAYS_EL[new Date(y, m-1, d).getDay()];
  return (withWd? wd+" " : "") + d + " " + MONTHS_EL[m-1] + (y!==new Date().getFullYear()? " "+y : "");
}

/* ——— Closure-registry merge ———
   data.json carries days/area on the CLOSURES registry; active-event
   entries may not repeat them. Merge by url+title (ids aren't
   guaranteed on either side; astynomia shares one url across events,
   hence the title in the key). */
const regKey = e => (e.url||"") + "||" + (e.title||"");
function buildReg(){
  REG = new Map();
  (DATA.closures||[]).forEach(c => REG.set(regKey(c), c));
}
function evDays(e){
  if(e.days && e.days.length) return e.days;
  const c = REG.get(regKey(e));
  return (c && c.days) || [];
}
function evArea(e){
  return e.area || ((REG.get(regKey(e))||{}).area || "");
}
function evHours(e){
  const h = (e.hours && e.hours.length === 2) ? e.hours
          : ((REG.get(regKey(e))||{}).hours || []);
  return h.length === 2 ? h : null;
}
function evReg(e){ return REG.get(regKey(e)) || null; }

/* Is the daily window in effect right now? Overnight windows
   (start > end, e.g. 19:00–07:00) belong to the LISTED day's evening
   and spill past midnight into the next morning. */
function hoursState(days, hours, now){
  if(!hours || !days || !days.length) return null;
  const today = isoOf(now);
  const y = new Date(now); y.setDate(y.getDate()-1);
  const mins = t => +t.slice(0,2)*60 + +t.slice(3,5);
  const nowM = now.getHours()*60 + now.getMinutes();
  const a = mins(hours[0]), b = mins(hours[1]);
  const onToday = days.includes(today), onYesterday = days.includes(isoOf(y));
  if(a < b ? (onToday && nowM >= a && nowM < b)
           : ((onToday && nowM >= a) || (onYesterday && nowM < b)))
    return "now";
  if(onToday && nowM < a) return "later";
  return null;
}

/* ——— Past detection ———
   1) merged registry days, when they exist: all before today → past;
   2) otherwise a light title sniff for year-less dates, using the SAME
      nearest-occurrence + grace rule as sources/enrich.py, so the two
      layers can never disagree about what "expired" means. */
const GR_MONTH_STEMS = {"ιανουαρ":1,"φεβρουαρ":2,"μαρτ":3,"απριλ":4,"μαι":5,"ιουν":6,
                        "ιουλ":7,"αυγουστ":8,"σεπτεμβρ":9,"οκτωβρ":10,"νοεμβρ":11,"δεκεμβρ":12};
const ACC = {"ά":"α","έ":"ε","ή":"η","ί":"ι","ό":"ο","ύ":"υ","ώ":"ω","ϊ":"ι","ΐ":"ι","ϋ":"υ","ΰ":"υ"};
const normEl = s => (s||"").toLowerCase().replace(/[άέήίόύώϊΐϋΰ]/g, c=>ACC[c]);

function nearestIsPast(d, mo, ref){
  let best = null;
  for(const y of [ref.getFullYear()-1, ref.getFullYear(), ref.getFullYear()+1]){
    const c = new Date(y, mo-1, d);
    if(c.getMonth() !== mo-1 || c.getDate() !== d) continue;   // e.g. 29/2 non-leap
    const delta = Math.round((c - ref) / 86400000);
    const rank = Math.abs(delta)*2 + (delta<0 ? 1 : 0);        // distance, ties → future
    if(best === null || rank < best.rank) best = {rank, delta};
  }
  return best ? best.delta < -PAST_GRACE_DAYS : false;
}
function titleSniffPast(title){
  const t = normEl(title);
  const found = [];
  let m;
  const numRe = /(?:^|[^\d/.\-])(\d{1,2})\/(\d{1,2})(?![\d/.\-])/g;
  while((m = numRe.exec(t))) found.push([+m[1], +m[2]]);
  const namRe = new RegExp("(\\d{1,2})(?:ης|ας|α|η)?\\s+("
                           + Object.keys(GR_MONTH_STEMS).join("|") + ")", "g");
  while((m = namRe.exec(t))) found.push([+m[1], GR_MONTH_STEMS[m[2]]]);
  if(!found.length) return false;
  const ref = new Date(); ref.setHours(0,0,0,0);
  return found.every(([d,mo]) => mo>=1 && mo<=12 && nearestIsPast(d, mo, ref));
}
function isPastEvent(e){
  const reg = evReg(e);
  if(reg && reg.status) return reg.status === "ended";
  const days = evDays(e);
  if(days.length){
    const today = todayISO();
    return days.every(d => d < today);
  }
  return titleSniffPast(e.title);
}

function matches(e){
  if(filt.src && e.source !== filt.src) return false;
  if(filt.area && evArea(e) !== filt.area) return false;
  return true;
}

function chip(label, pressed, onClick){
  const b = document.createElement("button");
  b.className = "chip"; b.textContent = label;
  b.setAttribute("aria-pressed", pressed ? "true" : "false");
  b.addEventListener("click", onClick);
  return b;
}

function renderFilters(){
  const evs = DATA.active_events||[];
  const srcs = [...new Set(evs.map(e=>e.source))];
  const areas = [...new Set(evs.map(evArea).filter(Boolean))];

  const sf = $("srcFilters"); sf.innerHTML = "";
  const sl = document.createElement("span"); sl.className="lbl"; sl.textContent="Πηγή";
  sf.appendChild(sl);
  sf.appendChild(chip("Όλες", !filt.src, ()=>{filt.src=null; render();}));
  srcs.forEach(s => sf.appendChild(
    chip(SHORT_SRC[s]||s, filt.src===s, ()=>{filt.src = filt.src===s? null : s; render();})));

  const af = $("areaFilters"); af.innerHTML = "";
  if(areas.length){
    const al = document.createElement("span"); al.className="lbl"; al.textContent="Περιοχή";
    af.appendChild(al);
    af.appendChild(chip("Όλες", !filt.area, ()=>{filt.area=null; render();}));
    areas.forEach(a => af.appendChild(
      chip(a, filt.area===a, ()=>{filt.area = filt.area===a? null : a; render();})));
  }
}

function tagsHtml(e){
  const t = [];
  const hours = evHours(e), reg = evReg(e);
  const hs = hoursState(evDays(e), hours, new Date());
  if(hs === "now") t.push('<span class="tag now">ΤΩΡΑ</span>');
  else if(hs === "later" && hours)
    t.push(`<span class="tag">σήμερα από ${esc(hours[0])}</span>`);
  if(reg && reg.extended) t.push('<span class="tag ext">ΠΑΡΑΤΑΣΗ</span>');
  const area = evArea(e);
  if(area) t.push(`<span class="tag area">${esc(area)}</span>`);
  if(hours) t.push(`<span class="tag">🕐 ${esc(hours[0])}–${esc(hours[1])}</span>`);
  const today = todayISO();
  const days = evDays(e);
  days.slice(0,8).forEach(d =>
    t.push(`<span class="tag${d===today?" today":""}">${esc(fmtDay(d))}</span>`));
  if(days.length > 8) t.push(`<span class="tag">+${days.length-8}</span>`);
  return t.length? `<div class="tags">${t.join("")}</div>` : "";
}

function cardHtml(e){
  return `
    <div class="card${e.new_this_run?" new":""}">
      ${e.new_this_run?'<span class="badge">νέο</span>':""}
      <div class="src">${esc(e.source)}</div>
      <div class="t"${e.plain?` title="${esc(e.title)}"`:""}>${esc(e.plain||e.title)}</div>
      ${e.details?`<div class="d">${esc(e.details)}</div>`:""}
      ${tagsHtml(e)}
      <a href="${esc(e.url)}" target="_blank" rel="noopener">Πηγή →</a>
    </div>`;
}

/* ——— Calendar (grid + day list) ——— */
window.calMove = k => {
  let m = cal.m + k, y = cal.y;
  if(m < 0){ m = 11; y--; }
  if(m > 11){ m = 0; y++; }
  cal.m = m; cal.y = y;
  render();
};
window.selDay = d => {
  cal.sel = (cal.sel === d) ? null : d;
  render();
};

function buildDayMap(){
  const byDay = new Map();
  (DATA.closures||[]).filter(c => !isRT(c) && matches(c)).forEach(c =>
    (c.days||[]).forEach(day => {
      if(!byDay.has(day)) byDay.set(day, []);
      byDay.get(day).push(c);
    }));
  return byDay;
}

function renderCalendar(){
  const byDay = buildDayMap();
  const today = todayISO();

  // month grid
  $("calTitle").textContent = MONTHS_FULL[cal.m] + " " + cal.y;
  const first = new Date(cal.y, cal.m, 1);
  const lead = (first.getDay() + 6) % 7;                 // Monday-first
  const nDays = new Date(cal.y, cal.m + 1, 0).getDate();
  let cells = WD_HEAD.map(w => `<span class="wd">${w}</span>`);
  for(let i = 0; i < lead; i++) cells.push('<span class="cd off"></span>');
  for(let d = 1; d <= nDays; d++){
    const iso = isoOf(new Date(cal.y, cal.m, d));
    const items = byDay.get(iso);
    const cls = ["cd", iso < today ? "pastd" : "", iso === today ? "today" : "",
                 items ? "has" : "", iso === cal.sel ? "sel" : ""].filter(Boolean).join(" ");
    cells.push(items
      ? `<button class="${cls}" data-n="${items.length}" onclick="selDay('${iso}')"
           aria-label="${esc(fmtDay(iso,true))}: ${items.length}">${d}</button>`
      : `<span class="${cls}">${d}</span>`);
  }
  $("calGrid").innerHTML = cells.join("");

  // day list: selected day, or all upcoming within the horizon
  let daysToShow, later = 0;
  if(cal.sel){
    daysToShow = byDay.has(cal.sel) ? [cal.sel] : [];
  }else{
    const h = new Date(); h.setDate(h.getDate() + LIST_HORIZON_DAYS);
    const horizon = isoOf(h);
    const upcoming = [...byDay.keys()].filter(d => d >= today).sort();
    daysToShow = upcoming.filter(d => d <= horizon);
    later = upcoming.length - daysToShow.length;
  }
  const clear = cal.sel
    ? `<div class="calclear"><button class="chip" onclick="selDay('${cal.sel}')" aria-pressed="true">✕ ${esc(fmtDay(cal.sel,true))} — όλα</button></div>` : "";
  $("calList").innerHTML = clear + (daysToShow.length ? daysToShow.map(day => {
    const items = byDay.get(day);
    return `<div class="day">
      <div class="dh">${day===today?"Σήμερα · ":""}${esc(fmtDay(day,true))}
        <span class="dcount">${items.length} ${items.length>1?"ρυθμίσεις":"ρύθμιση"}</span></div>
      ${items.map(c=>`
        <div class="ci${(c.days||[]).length>=LONG_EVENT_DAYS?" long":""}">
          ${c.area?`<span class="tag area">${esc(c.area)}</span>`:""}
          ${(c.hours&&c.hours.length===2)?`<span class="tag">🕐 ${esc(c.hours[0])}–${esc(c.hours[1])}</span>`:""}
          <a href="${esc(c.url)}" target="_blank" rel="noopener"${c.plain?` title="${esc(c.title)}"`:""}>${esc(c.plain||c.title)}</a>
        </div>`).join("")}
    </div>`;
  }).join("") : '<div class="empty">Τίποτα προγραμματισμένο ακόμη.</div>')
  + (later > 0 ? `<div class="later">+${later} ημέρες πιο μακριά — δες το 📅 ημερολόγιο για όλες.</div>` : "");
}

function render(){
  const d = DATA;
  const evs = (d.active_events||[]);
  const nonRT = evs.filter(e => !isRT(e));
  const activeAll = nonRT.filter(e => !isPastEvent(e));
  const pastAll = nonRT.filter(isPastEvent);
  const rtAll = evs.filter(isRT);
  const main = activeAll.filter(matches);
  const past = pastAll.filter(matches);
  const rt = rtAll.filter(matches);
  const srcs = d.sources||[];
  const failing = srcs.filter(s=>!s.ok).length;
  const fresh = evs.filter(e=>e.new_this_run).length;

  // Big answer counts truly-ACTIVE main events only
  const col = activeAll.length ? "var(--alert)" : (failing ? "var(--warn)" : "var(--ok)");
  const txt = activeAll.length
      ? activeAll.length + (activeAll.length>1?" ενεργές ρυθμίσεις":" ενεργή ρύθμιση")
      : "Όλα ανοιχτά";
  $("answer").innerHTML = `<span class="lamp" style="background:${col}"></span>${txt}`;
  $("checked").textContent = "Ενημερώθηκε " + ago(d.generated_at)
      + (rtAll.length ? ` · ${rtAll.length} ζωντανά περιστατικά` : "")
      + (fresh ? ` · ${fresh} νέα` : "")
      + (failing ? ` · ${failing} πηγές εκτός` : "");

  renderFilters();
  renderCalendar();
  const filtered = !!(filt.src || filt.area);

  $("cMain").textContent = filtered ? main.length + " / " + activeAll.length : activeAll.length;
  $("events").innerHTML = main.length ? main.map(cardHtml).join("")
    : `<div class="empty">${filtered ? "Τίποτα με αυτά τα φίλτρα." :
        "Ήσυχοι δρόμοι — καμία γνωστή ρύθμιση σε ισχύ αυτή τη στιγμή."}</div>`;

  $("cRt").textContent = filtered ? rt.length + " / " + rtAll.length : rtAll.length;
  $("rtlist").innerHTML = rt.length ? rt.map(e=>{
    const det = (e.details||"").replace(/^Κλειστός δρόμος(\s*—\s*Κλειστό;?\s*)?/,"").replace(/^Κλειστό;?\s*/,"").trim();
    return `
    <div class="rt">
      <span class="t">${esc(e.title)}</span>
      ${evArea(e)?`<span class="tag area">${esc(evArea(e))}</span>`:""}
      <a href="${esc(e.url)}" target="_blank" rel="noopener">χάρτης →</a>
      ${det?`<span class="d">${esc(det)}</span>`:""}
    </div>`;}).join("")
    : `<div class="empty">${filtered ? "Τίποτα με αυτά τα φίλτρα." :
        "Κανένα ζωντανό περιστατικό αυτή τη στιγμή."}</div>`;

  // Past events with known dates: out of the way unless asked for.
  const pt = $("pastToggle");
  pt.hidden = pastAll.length === 0;
  pt.textContent = showPast
      ? "▾ Απόκρυψη παλαιότερων"
      : `▸ Παλαιότερες ρυθμίσεις (${filtered ? past.length + "/" + pastAll.length : pastAll.length})`;
  $("past").hidden = !showPast || pastAll.length === 0;
  $("past").innerHTML = !$("past").hidden && past.length
      ? past.map(cardHtml).join("")
      : (showPast ? '<div class="empty">Τίποτα με αυτά τα φίλτρα.</div>' : "");

  // ——— System panel ———
  $("health").innerHTML = srcs.map(s=>{
    const drops = Object.entries(s.dropped||{});
    const dropTxt = drops.map(([r,n])=>r+": "+n).join(" · ");
    return `<div class="srcrow" tabindex="0" ${dropTxt?`title="${esc(dropTxt)}"`:""}
                 onclick="this.classList.toggle('open')">
      <span class="lamp" style="background:${s.ok?"var(--ok)":(s.consecutive_failures>=6?"var(--alert)":"var(--warn)")}"></span>
      <span class="n">${esc(s.name)}</span>
      <span class="meta">${s.items}${s.fetched!=null?" / "+s.fetched:""} · ${ago(s.last_success)}${s.ok?"":" · ×"+s.consecutive_failures}</span>
      ${dropTxt?`<span class="drops">${esc(dropTxt)}</span>`:""}
    </div>`;
  }).join("");

  const hist = d.recent_notifications||[];
  $("history").innerHTML = hist.length ? hist.map(n=>`
    <div class="noterow">
      <div class="when">${esc(n.source)} · ${ago(n.time)}</div>
      ${n.url?`<a href="${esc(n.url)}" target="_blank" rel="noopener">${esc(n.title)}</a>`:esc(n.title)}
    </div>`).join("")
    : '<div class="empty">Καμία ειδοποίηση ακόμη.</div>';

  const runs = d.runs||[];
  $("foot").innerHTML = '<b>KleistoKentro</b> · ανοιχτά δεδομένα για τους δρόμους του κέντρου'
    + (runs.length ? ` · ${runs.length} έλεγχοι` : "")
    + ' · <a href="closures.ics">📅 Ημερολόγιο</a> · <a href="admin.html">Διαχείριση</a>';
}

async function load(){
  try{
    DATA = await (await fetch("data.json?t="+Date.now())).json();
  }catch(e){
    $("answer").innerHTML = '<span class="lamp" style="background:var(--warn)"></span>Χωρίς δεδομένα';
    $("checked").textContent = "Δεν βρέθηκαν δεδομένα ακόμη — δοκίμασε ξανά σε λίγο.";
    return;
  }
  buildReg();
  if(cal.y === null){
    const now = new Date();
    cal.y = now.getFullYear(); cal.m = now.getMonth();
  }
  render();
}
load();
setInterval(load, 5*60*1000);
</script>
