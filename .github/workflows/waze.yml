name: Waze fast check

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 min — Waze incidents are short-lived
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: monitor             # SAME group as the main workflow: the two
  cancel-in-progress: false  # schedules can never race on state.json

jobs:
  waze:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run monitor (waze only)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor.py --only waze
      - name: Commit state
        run: |
          git config user.name "traffic-monitor-bot"
          git config user.email "actions@github.com"
          git add state.json docs/data.json
          git diff --cached --quiet || git commit -m "Update state (waze) [skip ci]"
          git pull --rebase
          git push
