name: Athens traffic monitor

on:
  schedule:
    # Every 4 hours. NOTE: GitHub cron is best-effort — runs can be
    # delayed or occasionally skipped. The URL-based dedup design means
    # a skipped run loses nothing; the next run catches up.
    - cron: "0 */4 * * *"
  workflow_dispatch: {}   # allows manual "Run workflow" button for testing

permissions:
  contents: write         # needed to commit state.json back

concurrency:
  group: monitor          # never let two runs race on state.json
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TOMTOM_API_KEY: ${{ secrets.TOMTOM_API_KEY }}
        run: python monitor.py

      - name: Commit state
        run: |
          git config user.name "traffic-monitor-bot"
          git config user.email "actions@github.com"
          git add state.json docs/data.json
          git diff --cached --quiet || git commit -m "Update state [skip ci]"
          git pull --rebase
          git push
